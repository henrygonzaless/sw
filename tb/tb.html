<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID66 | TB Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e3e;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #e0e0e0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a1030 0%, #0a0a0a 75%); /* Purple tint for TB/RotE */
        }
        .box-content {
            font-size: 0.9rem;
            color: #e0e0e0;
            line-height: 1.4;
        }

        /* Optional: Make the bullet point color match your theme */
        .box-content div {
            position: relative;
            padding-left: 12px;
        }

        .box-content div::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
        }
        /* Navbar */
        .navbar {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .navbar ul { display: flex; list-style: none; gap: 20px; }
        .navbar a { color: #999; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        /* Layout */
        .tb-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Guides */
        .sidebar {
            width: 200px;
            border-right: 1px solid var(--border);
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }

        .sidebar h2 { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .sidebar ul { list-style: none; }
        .sidebar li { margin-bottom: 10px; }
        .sidebar a { color: #ccc; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .sidebar a:hover { color: #fff; padding-left: 5px; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 4vw;
            overflow: hidden;
        }

        .header-area { text-align: center; margin-bottom: 3vh; }
        h1 { font-size: clamp(1.2rem, 3vh, 2rem); text-transform: uppercase; letter-spacing: 2px; }

        /* Search Area */
        .search-wrapper { width: 100%; max-width: 500px; margin: 0 auto 2vh auto; }
        select {
            width: 100%; background: #1a1a1a; border: 1px solid var(--primary); color: #fff;
            padding: 12px; border-radius: 8px; font-family: inherit; outline: none; cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='red' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }

        /* Dynamic Grid */
        #planet-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .planet-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            border-top: 2px solid var(--primary);
            animation: fadeIn 0.4s ease forwards;
        }

        .planet-box h3 { font-size: 0.75rem; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
        .planet-box p { font-size: 0.95rem; line-height: 1.5; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile */
        @media (max-width: 768px) {
            .tb-wrapper { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; padding: 10px 20px; }
            .sidebar h2 { margin-bottom: 0; }
            .sidebar ul { display: flex; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../tw.html">TW</a></li>
            <li><a href="tb.html">TB</a></li>
            <li><a href="../contact.html">Contact</a></li>

        </ul>
    </nav>

    <div class="tb-wrapper">
        <aside class="sidebar">
            <h2>Guides</h2>
            <ul>
                <li><a href="reva.html">Reva</a></li>
                <li><a href="zeffo.html">Zeffo</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="header-area">
                <h1>Rise of the Empire</h1>
                <div class="search-wrapper">
                    <select id="planet-dropdown">
                        <option value="" disabled selected>Identify Planet Sector...</option>
                    </select>
                </div>
            </div>

            <div id="planet-grid">
                </div>
        </main>
    </div>

    <script src="planet-constant.js"></script>
</body>
</html>
