<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID66 | TW Counters</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Specific Styles for TW Page */
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tw-container {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            align-items: center;
        }

        /* Sidebar Selector */
        .selection-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .selection-panel h2 {
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        select {
            background: #1a1a1a;
            color: white;
            border: 1px solid var(--primary);
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
        }

        /* Results Display */
        .display-panel {
            flex: 2;
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #888;
            padding: 0 15px;
        }

        td {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 700;
            color: #fff;
        }

        td:first-child { border-left: 4px solid var(--primary); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.1); border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .tw-container { flex-direction: column; overflow-y: auto; height: auto; }
            body { overflow-y: auto; height: auto; }
            .selection-panel, .display-panel { height: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="tw.html">TW Counters</a></li>
            <li><a href="tw-stats.html">TW History</a></li>
            <li><a href="journey.html">Journey</a></li>
        </ul>
    </nav>

    <div class="tw-container">
        <div class="selection-panel">
            <h2>Select Enemy Lead</h2>
            <select id="dropdown">
                <option value="" disabled selected>Search Holographic Records...</option>
                </select>
            
            <div style="margin-top: 20px; color: #666; font-size: 0.8rem;">
                <p>Select a squad lead to retrieve counter-intelligence from the Imperial Database.</p>
            </div>
        </div>

        <div class="display-panel">
            <table>
                <thead>
                    <tr id="tableHeaders">
                        </tr>
                </thead>
                <tbody>
                    <tr id="tableValues">
                        <td colspan="4" style="text-align: center; color: #444;">Awaiting Input...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="tw.js"></script>
</body>
</html>
